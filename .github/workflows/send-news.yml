name: Send Daily Tech News Email

on:
  schedule:
    - cron: '0 13 * * *' # UTC时间=北京时间21点，每天北京时间21:00
  workflow_dispatch: # 允许手动触发

jobs:
  send_news:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Generate news digest (placeholder)
        run: |
          echo "抓取新闻或调用外部API生成日报" > daily_news.txt
          # 这里可替换为实际爬虫/脚本，如: python fetch_news.py > daily_news.txt# 这里可替换为实际爬虫/脚本，如: python fetch_news.py > daily_news.txt

      - name: Send Mail
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.qq.com
          server_port: 465
          username: ${{ secrets.QQ_EMAIL_USER }}
          password: ${{ secrets.QQ_EMAIL_PASS }}
          subject: '科技新闻日报 Daily News Digest'
          body: |
            请见附件或内容，来自自动化脚本
          to: 1584089278@qq.com
          from: ${{ secrets.QQ_EMAIL_USER }}
          secure: true
          content_type: text/plain
          attachments: daily_news.txt
